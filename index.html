<body>
    <div id = "site-container">

        <i>though barren now, this ground shall yet bear fruit</i>
    </div>

    <script>
        const startDate = new Date('2026-05-31');
        const currentDate = new Date();
        const differenceTime = Math.abs(currentDate - startDate);
        const differenceDays = Math.floor(differenceTime / (1000 * 60 * 60 * 24));
        document.getElementById('days').innerText = differenceDays;

        //easter egg stuff
        const konamii = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a', 'Enter'];
        let kIndex = 0;
        const microwaveAudio = new Audio('microwave.mp3');
        microwaveAudio.loop = true;
        const endAudio = new Audio('end.mp3');
        let hasRan = false;
        document.addEventListener('keydown', (e) => {
            if (hasRan) return;
            if (e.key === konamii[kIndex]) {
                kIndex++;
                if (kIndex === konamii.length) {
                    microwave();
                    kIndex = 0;
                }
            } else {
                //if they messed up
                kIndex = 0;
            }
        });

        function microwave() {
            hasRan = true;
            const container = document.getElementById('site-container');
            const clue = document.querySelector('.clue');
            if (clue) {
                clue.style.display = 'none';
            }
            microwaveAudio.play();
            setTimeout(() => {
                container.classList.add('spin-cycle');
            }, 400);
            setTimeout(() => {
                container.style.transition = 'none';
                container.classList.remove('spin-cycle');
                void container.offsetHeight;
                container.style.transition = 'transform 7s linear';
                microwaveAudio.pause();
                microwaveAudio.currentTime = 0;
                endAudio.play();
            }, 7400);
        }
    </script>
    <div class="clue">🡩🡩🡫🡫🡨🡪🡨🡪BA↲</div>
</body>
</html>
